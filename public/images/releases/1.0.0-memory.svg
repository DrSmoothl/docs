<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">A_Memorix memory graph</title>
  <desc id="desc">A visual graph representing the A_Memorix memory system.</desc>
  <rect width="1280" height="720" fill="#f7fbf7"/>
  <text x="90" y="104" fill="#18261b" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="42" font-weight="700">A_Memorix 长期记忆主线化</text>
  <text x="90" y="148" fill="#5c6d5f" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="22">记忆不再只是一段文本，而是有来源、证据和关系的知识网络。</text>
  <g stroke="#7ba77d" stroke-width="4" fill="none">
    <path d="M380 330 L590 250"/>
    <path d="M590 250 L815 330"/>
    <path d="M380 330 L590 450"/>
    <path d="M590 450 L815 330"/>
    <path d="M590 250 L590 450"/>
    <path d="M260 480 L380 330"/>
    <path d="M815 330 L990 470"/>
  </g>
  <g font-family="Inter, 'Microsoft YaHei', sans-serif" text-anchor="middle">
    <circle cx="380" cy="330" r="74" fill="#e3f4e3" stroke="#74a979" stroke-width="4"/>
    <text x="380" y="323" fill="#214d28" font-size="25" font-weight="700">段落</text>
    <text x="380" y="357" fill="#426b48" font-size="17">聊天与知识片段</text>
    <circle cx="590" cy="250" r="78" fill="#fff5d9" stroke="#c9a34e" stroke-width="4"/>
    <text x="590" y="243" fill="#654a10" font-size="25" font-weight="700">实体</text>
    <text x="590" y="277" fill="#75602d" font-size="17">人物、事物、话题</text>
    <circle cx="815" cy="330" r="82" fill="#e5f1ff" stroke="#6b98cc" stroke-width="4"/>
    <text x="815" y="323" fill="#193e68" font-size="25" font-weight="700">关系</text>
    <text x="815" y="357" fill="#42617e" font-size="17">事实与连接</text>
    <circle cx="590" cy="450" r="76" fill="#f1eaff" stroke="#9376c9" stroke-width="4"/>
    <text x="590" y="443" fill="#4a3672" font-size="25" font-weight="700">证据</text>
    <text x="590" y="477" fill="#65577f" font-size="17">来源与置信度</text>
    <circle cx="260" cy="480" r="62" fill="#fff0ef" stroke="#c87970" stroke-width="4"/>
    <text x="260" y="475" fill="#6e3833" font-size="22" font-weight="700">画像</text>
    <text x="260" y="506" fill="#7d5752" font-size="16">人物事实</text>
    <circle cx="990" cy="470" r="66" fill="#edf2f7" stroke="#8797a8" stroke-width="4"/>
    <text x="990" y="464" fill="#354555" font-size="22" font-weight="700">检索</text>
    <text x="990" y="496" fill="#596b7c" font-size="16">按场景召回</text>
  </g>
  <text x="90" y="640" fill="#5c6d5f" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="19">结果：能看到记忆来自哪里，也能通过纠错和导入维护长期知识。</text>
</svg>
