<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">MaiBot 1.0.0 overview</title>
  <desc id="desc">A visual summary of MaiBot 1.0.0 core updates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eef7f2"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#22404a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="70" y="64" width="1140" height="592" rx="32" fill="url(#panel)" filter="url(#shadow)"/>
  <text x="112" y="142" fill="#17212b" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="48" font-weight="700">MaiBot 1.0.0</text>
  <text x="112" y="190" fill="#52616f" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="24">从聊天机器人，升级为可观察、可记忆、可扩展的对话智能体</text>
  <g transform="translate(112 250)">
    <rect width="310" height="150" rx="20" fill="#e8f4ff"/>
    <text x="28" y="48" fill="#0f3b5f" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="25" font-weight="700">Maisaka 回复核心</text>
    <text x="28" y="88" fill="#31566f" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="18">观察聊天、判断时机、选择工具</text>
    <text x="28" y="118" fill="#31566f" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="18">并组织更自然的回复</text>
  </g>
  <g transform="translate(486 250)">
    <rect width="310" height="150" rx="20" fill="#eff8ec"/>
    <text x="28" y="48" fill="#1f5128" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="25" font-weight="700">A_Memorix 记忆</text>
    <text x="28" y="88" fill="#3f673f" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="18">段落、实体、关系和证据统一管理</text>
    <text x="28" y="118" fill="#3f673f" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="18">长期记忆可检索、可纠错</text>
  </g>
  <g transform="translate(860 250)">
    <rect width="310" height="150" rx="20" fill="#fff3e3"/>
    <text x="28" y="48" fill="#684112" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="25" font-weight="700">Dashboard 新体验</text>
    <text x="28" y="88" fill="#73552b" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="18">配置、插件、日志、统计和推理过程</text>
    <text x="28" y="118" fill="#73552b" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="18">整合为统一工作台</text>
  </g>
  <g transform="translate(238 455)">
    <rect width="360" height="122" rx="20" fill="#f0edff"/>
    <text x="28" y="45" fill="#46347a" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">插件、MCP 与工具</text>
    <text x="28" y="82" fill="#5f5390" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="18">插件运行时独立化，外部工具接入更稳定</text>
  </g>
  <g transform="translate(682 455)">
    <rect width="360" height="122" rx="20" fill="#ffeef1"/>
    <text x="28" y="45" fill="#6f2f3e" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">图片与表情包</text>
    <text x="28" y="82" fill="#7d4a55" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="18">多模态上下文、图片缓存和资源管理增强</text>
  </g>
  <path d="M420 325 C452 325 454 325 486 325" stroke="#8aa6b5" stroke-width="4" fill="none"/>
  <path d="M794 325 C826 325 828 325 860 325" stroke="#8aa6b5" stroke-width="4" fill="none"/>
  <path d="M598 516 C628 516 652 516 682 516" stroke="#8aa6b5" stroke-width="4" fill="none"/>
</svg>
