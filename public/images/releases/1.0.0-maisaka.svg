<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Maisaka reasoning flow</title>
  <desc id="desc">A flow diagram for the Maisaka reasoning process in MaiBot 1.0.0.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f7ff"/>
      <stop offset="1" stop-color="#f9fcff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f3b5c" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="90" y="104" fill="#17212b" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="42" font-weight="700">Maisaka 的新回复链路</text>
  <text x="90" y="148" fill="#5a6875" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="22">麦麦不再只是收到消息后立刻回答，而是按场景判断、检索、规划和生成。</text>
  <g transform="translate(90 245)" filter="url(#shadow)">
    <rect width="210" height="135" rx="20" fill="#ffffff"/>
    <text x="28" y="54" fill="#123b63" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">接收消息</text>
    <text x="28" y="92" fill="#4f6478" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="17">群聊、私聊、WebUI</text>
  </g>
  <g transform="translate(350 245)" filter="url(#shadow)">
    <rect width="210" height="135" rx="20" fill="#ffffff"/>
    <text x="28" y="54" fill="#123b63" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">Timing Gate</text>
    <text x="28" y="92" fill="#4f6478" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="17">判断是否该行动</text>
  </g>
  <g transform="translate(610 245)" filter="url(#shadow)">
    <rect width="210" height="135" rx="20" fill="#ffffff"/>
    <text x="28" y="54" fill="#123b63" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">Planner</text>
    <text x="28" y="92" fill="#4f6478" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="17">选择动作与工具</text>
  </g>
  <g transform="translate(870 245)" filter="url(#shadow)">
    <rect width="210" height="135" rx="20" fill="#ffffff"/>
    <text x="28" y="54" fill="#123b63" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">Replyer</text>
    <text x="28" y="92" fill="#4f6478" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="17">生成回复片段</text>
  </g>
  <g transform="translate(520 480)" filter="url(#shadow)">
    <rect width="240" height="118" rx="20" fill="#e8f5ff"/>
    <text x="30" y="46" fill="#123b63" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="23" font-weight="700">记忆与多模态上下文</text>
    <text x="30" y="82" fill="#4f6478" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="17">摘要、图片、工具结果、人物画像</text>
  </g>
  <path d="M300 312 L350 312" stroke="#88a0b2" stroke-width="5" fill="none"/>
  <path d="M560 312 L610 312" stroke="#88a0b2" stroke-width="5" fill="none"/>
  <path d="M820 312 L870 312" stroke="#88a0b2" stroke-width="5" fill="none"/>
  <path d="M630 480 C610 435 610 405 660 380" stroke="#88a0b2" stroke-width="4" fill="none"/>
  <path d="M730 480 C780 435 825 400 930 380" stroke="#88a0b2" stroke-width="4" fill="none"/>
  <text x="90" y="640" fill="#566675" font-family="Inter, 'Microsoft YaHei', sans-serif" font-size="19">结果：减少无效回复，保留更长上下文，让回复更像一次连续的交流。</text>
</svg>
